services:
  db:
    image: postgres:16
    container_name: mailpilot-db
    environment:
      POSTGRES_DB: mailpilot
      POSTGRES_USER: mailpilot
      POSTGRES_PASSWORD: mailpilot
    ports:
      - "5436:5432"
    volumes:
      - mailpilot_pg:/var/lib/postgresql/data

volumes:
  mailpilot_pg:
