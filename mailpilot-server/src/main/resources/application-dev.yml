spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/mailpilot
    username: mailpilot
    password: mailpilot
    hikari:
      maximum-pool-size: 5
  flyway:
    enabled: true
    locations: classpath:db/migration

mailpilot:
  startup:
    log-db-url: true
  cacheDir: ${LOCALAPPDATA:${user.home}/AppData/Local}/MailPilot/cache
