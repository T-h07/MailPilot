name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - AdditionalFeatures
      - cleanup/**

jobs:
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mailpilot-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure mvnw executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw -q test

      - name: Spotless check
        run: ./mvnw -q spotless:check

  frontend:
    name: Frontend (Node LTS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mailpilot-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: mailpilot-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
